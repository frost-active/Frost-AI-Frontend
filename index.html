<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hydration Assistant</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat Container */
.chat-wrapper {
    width: 95%;
    max-width: 1000px;
    height: 90vh;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: flex;
    overflow: hidden;
}

/* LEFT SIDE */
.chat-container {
    width: 60%;
    display: flex;
    flex-direction: column;
}

/* RIGHT SIDE LOG PANEL */
.log-panel {
    width: 40%;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    padding: 15px;
    overflow-y: auto;
    border-left: 1px solid #333;
}

/* Header */
.chat-header {
    padding: 20px;
    background: linear-gradient(135deg, #0077ff, #00c6ff);
    color: white;
    font-size: 20px;
    font-weight: 600;
}

/* Messages */
.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f7f9fc;
}

.message {
    max-width: 75%;
    margin-bottom: 15px;
    padding: 14px 18px;
    border-radius: 16px;
    animation: fadeIn 0.3s ease-in-out;
    white-space: pre-wrap;
    font-size: 14px;
}

.user {
    background: #0077ff;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

.bot {
    background: #e9eef5;
    color: #333;
    border-bottom-left-radius: 4px;
}

.typing {
    font-style: italic;
    opacity: 0.7;
}

/* Input Area */
.chat-input {
    display: flex;
    padding: 15px;
    border-top: 1px solid #ddd;
    background: white;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.chat-input button {
    margin-left: 10px;
    padding: 12px 20px;
    background: #0077ff;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="chat-wrapper">

    <div class="chat-container">

        <div class="chat-header">
            💧 Hydration Scheduler Assistant
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
Hi 👋 I'm your Hydration Assistant.

Tell me your schedule like:

"I work from 9am to 5pm, lunch 12:30 to 1:30, remind me every 40 minutes"
            </div>
        </div>

        <div class="chat-input">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Type your schedule..." 
                autocomplete="off"
            />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <!-- LOG PANEL -->
    <div class="log-panel" id="logPanel"></div>

</div>

<script>
const API_URL = "https://frost-ai-eehc.onrender.com/parse";

const chatMessages = document.getElementById("chatMessages");
const userInput = document.getElementById("userInput");

function addMessage(content, className) {
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.textContent = content;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addTyping() {
    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.id = "typing";
    typing.textContent = "Typing...";
    chatMessages.appendChild(typing);
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

/* ✅ Animated Logs */
function renderLogs(logs) {
    const panel = document.getElementById("logPanel");
    panel.innerHTML = "";

    let index = 0;

    function addNextLog() {
        if (index >= logs.length) return;

        const line = document.createElement("div");
        line.textContent = logs[index];
        panel.appendChild(line);

        panel.scrollTop = panel.scrollHeight;

        index++;

        setTimeout(addNextLog, 400);
    }

    addNextLog();
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    userInput.value = "";

    addTyping();

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        removeTyping();

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || "Server error");
        }

        const result = await response.json();

        // ✅ Show logs (animated)
        renderLogs(result.logs);

        // ✅ Simple confirmation message
        addMessage("Configured !", "bot");

        // ✅ Download JSON
        const jsonText = JSON.stringify(result.data, null, 2);
        const blob = new Blob([jsonText], { type: "application/json" });
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "hydration_schedule.json";
        document.body.appendChild(a);
        a.click();
        a.remove();

    } catch (error) {
        removeTyping();
        addMessage("❌ " + error.message, "bot");
    }
}

userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
