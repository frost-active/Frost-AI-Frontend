<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hydration Scheduler</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255, 255, 255, 0.08);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    resize: none;
    font-size: 14px;
    outline: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    background: linear-gradient(to right, #0072ff, #00c6ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.status {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>💧 Hydration Scheduler</h1>

    <textarea id="inputText" placeholder="e.g. Remind me every 30 minutes from 9 AM to 6 PM, except during lunch 1–2 PM"></textarea>

    <button onclick="sendRequest()">Generate Schedule</button>

    <div class="status" id="status"></div>
</div>

<script>
const API_URL = "https://frost-ai-eehc.onrender.com/parse";

async function sendRequest() {
    const text = document.getElementById("inputText").value;
    const status = document.getElementById("status");

    if (!text.trim()) {
        status.innerText = "⚠️ Please enter some text";
        return;
    }

    status.innerText = "⏳ Processing...";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || "Something went wrong");
        }

        // Get blob (file download)
        const blob = await response.blob();

        // Create download link
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "hydration_schedule.json";
        document.body.appendChild(a);
        a.click();
        a.remove();

        status.innerText = "✅ Downloaded successfully!";

    } catch (error) {
        status.innerText = "❌ " + error.message;
    }
}
</script>

</body>
</html>
