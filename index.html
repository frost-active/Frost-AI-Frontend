<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Scheduler Assistant</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-wrapper {
    width: 95%;
    max-width: 1100px;
    height: 90vh;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: flex;
    overflow: hidden;
}

.chat-container {
    width: 65%;
    display: flex;
    flex-direction: column;
}

.log-panel {
    width: 35%;
    background: #1a1a1a;
    color: #9f9;
    font-family: monospace;
    font-size: 11px;
    padding: 15px;
    overflow-y: auto;
    border-left: 1px solid #333;
}

.log-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ccc;
}

.chat-header {
    padding: 20px;
    background: linear-gradient(135deg, #0077ff, #00c6ff);
    color: white;
    font-size: 20px;
    font-weight: 600;
}

.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f7f9fc;
}

.message {
    max-width: 80%;
    margin-bottom: 15px;
    padding: 14px 18px;
    border-radius: 16px;
    white-space: pre-wrap;
    font-size: 14px;
}

.user {
    background: #0077ff;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e9eef5;
    color: #333;
}

.typing {
    font-style: italic;
    opacity: 0.7;
}

.section {
    margin-bottom: 12px;
}

.section-title {
    font-weight: 600;
    margin-bottom: 4px;
}

.chat-input {
    display: flex;
    padding: 15px;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.chat-input button {
    margin-left: 10px;
    padding: 12px 20px;
    background: #0077ff;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-wrapper">

    <div class="chat-container">

        <div class="chat-header">
            🧠 Smart Scheduler Assistant
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
Hi 👋

Tell me your schedule like:

"I work 9 to 5, drink water every 30 min, eye breaks every 20 min"
            </div>
        </div>

        <div class="chat-input">
            <input id="userInput" placeholder="Type your schedule..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <div class="log-panel">
        <div class="log-title">System Logs</div>
        <div id="logPanel"></div>
    </div>

</div>

<script>
const API_URL = "https://frost-ai-eehc.onrender.com/parse";

const chatMessages = document.getElementById("chatMessages");
const userInput = document.getElementById("userInput");

// Add message
function addMessage(content, className) {
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.innerHTML = content;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Typing indicator
function addTyping() {
    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.id = "typing";
    typing.textContent = "Thinking...";
    chatMessages.appendChild(typing);
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

// Logs
function renderLogs(logs) {
    const panel = document.getElementById("logPanel");
    panel.innerHTML = "";
    if (!Array.isArray(logs)) return;

    logs.forEach(line => {
        const div = document.createElement("div");
        div.textContent = line;
        panel.appendChild(div);
    });
}

// Helpers
function msToMinutes(ms) {
    return Math.round(ms / 60000);
}

// Format CONFIG (FINAL)
function formatConfig(data) {
    const h = data.hydration || {};
    const eye = data.eye || {};
    const stretch = data.stretch || {};
    const walk = data.walk || {};
    const dnd = data.dnd || {};

    let html = `<div class="section-title">⚙️ Device Configuration</div>`;

    // DND (NEW)
    if (dnd.enabled) {
        const start = `${String(dnd.sh).padStart(2,'0')}:${String(dnd.sm).padStart(2,'0')}`;
        const end = `${String(dnd.eh).padStart(2,'0')}:${String(dnd.em).padStart(2,'0')}`;

        html += `<div class="section">
        <div class="section-title">🔕 Do Not Disturb</div>
        ${start} - ${end}
        </div>`;
    }

    // HYDRATION
    if (h.enabled) {
        const start = `${String(h.start_hour).padStart(2,'0')}:${String(h.start_min).padStart(2,'0')}`;
        const end = `${String(h.end_hour).padStart(2,'0')}:${String(h.end_min).padStart(2,'0')}`;

        html += `<div class="section">
        <div class="section-title">💧 Hydration</div>
        Every ${msToMinutes(h.interval_ms)} min<br>
        ${start} - ${end}
        </div>`;
    }

    // EYE
    if (eye.enabled) {
        const start = `${String(eye.start_hour).padStart(2,'0')}:${String(eye.start_min).padStart(2,'0')}`;
        const end = `${String(eye.end_hour).padStart(2,'0')}:${String(eye.end_min).padStart(2,'0')}`;

        html += `<div class="section">
        <div class="section-title">👁 Eye Care</div>
        Every ${msToMinutes(eye.interval_ms)} min<br>
        ${start} - ${end}
        </div>`;
    }

    // STRETCH
    if (stretch.enabled) {
        let phaseText = "";

        if (Array.isArray(stretch.phases)) {
            stretch.phases.forEach(p => {
                const s = `${String(p.sh).padStart(2,'0')}:${String(p.sm).padStart(2,'0')}`;
                const e = `${String(p.eh).padStart(2,'0')}:${String(p.em).padStart(2,'0')}`;
                phaseText += `${s} - ${e}<br>`;
            });
        }

        html += `<div class="section">
        <div class="section-title">🏃 Stretch</div>
        Every ${msToMinutes(stretch.interval_ms)} min<br>
        ${phaseText}
        </div>`;
    }

    // WALK
    if (walk.enabled) {
        const start = `${String(walk.start_hour).padStart(2,'0')}:${String(walk.start_min).padStart(2,'0')}`;
        const end = `${String(walk.end_hour).padStart(2,'0')}:${String(walk.end_min).padStart(2,'0')}`;

        html += `<div class="section">
        <div class="section-title">🚶 Walk</div>
        Every ${walk.interval_min} min<br>
        ${start} - ${end}
        </div>`;
    }

    if (!h.enabled && !eye.enabled && !stretch.enabled && !walk.enabled) {
        html += `<div class="section">⚠️ No tasks enabled</div>`;
    }

    return html;
}

// Send message
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    userInput.value = "";

    addTyping();

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ text })
        });

        removeTyping();

        const result = await response.json();

        if (result.error) {
            addMessage("❌ " + result.error, "bot");
            return;
        }

        renderLogs(result.logs || []);

        const summary = formatConfig(result.data);
        addMessage(summary, "bot");

        // JSON download
        const jsonText = JSON.stringify(result.data, null, 2);
        const blob = new Blob([jsonText], { type: "application/json" });
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "frost_config.json";
        document.body.appendChild(a);
        a.click();
        a.remove();

    } catch (err) {
        removeTyping();
        addMessage("❌ Error: " + err.message, "bot");
    }
}

// Enter key
userInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
